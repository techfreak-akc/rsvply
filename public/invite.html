<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Invited!</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* Background layers */
    #bg { position: fixed; inset: 0; z-index: 0; }
    #bg-gradient { position: absolute; inset: 0; }
    #bg-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    }

    /* Floating emojis */
    #floaters { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .floater {
      position: absolute; font-size: 24px; opacity: 0.12;
      animation: floatUp linear infinite;
      user-select: none;
    }
    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.12; }
      90% { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Main content */
    .page { position: relative; z-index: 2; max-width: 580px; margin: 0 auto; padding: 40px 20px 80px; }

    .powered { font-size: 11px; color: rgba(255,255,255,0.2); margin-bottom: 32px; letter-spacing: 2px; text-transform: uppercase; }

    /* Hero section */
    .hero { text-align: center; margin-bottom: 36px; }
    .hero-emoji {
      font-size: 72px; margin-bottom: 16px; display: block;
      animation: heroPulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px var(--glow));
    }
    @keyframes heroPulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.08); } }

    .headline {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 900; color: var(--primary);
      text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
      line-height: 1.2; margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .body-text {
      font-size: 15px; line-height: 1.8;
      color: var(--text); opacity: 0.75; max-width: 440px; margin: 0 auto;
    }

    /* Glowing divider */
    .divider {
      height: 1px; margin: 28px 0;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      box-shadow: 0 0 10px var(--glow);
    }

    /* Event details card */
    .details-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-top: 2px solid var(--primary);
      border-radius: 16px; padding: 24px; margin-bottom: 28px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .detail-row {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-icon { font-size: 20px; flex-shrink: 0; }
    .detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); opacity: 0.7; margin-bottom: 3px; }
    .detail-val { font-size: 15px; font-weight: 600; color: #fff; }

    /* RSVP Panel */
    .rsvp-panel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }
    .rsvp-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; letter-spacing: 3px; color: var(--primary);
      margin-bottom: 24px; text-transform: uppercase;
    }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 12px 14px; color: #fff; font-family: 'Inter', sans-serif;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--glow); }
    .field select option { background: #1a0030; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .status-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .status-btn {
      padding: 16px 12px; border-radius: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif;
    }
    .status-btn.yes.active { background: rgba(0,255,136,0.1); border-color: #00ff88; color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
    .status-btn.no.active { background: rgba(255,68,68,0.1); border-color: #ff4444; color: #ff4444; box-shadow: 0 0 15px rgba(255,68,68,0.2); }
    .status-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    .submit-btn {
      width: 100%; padding: 16px; margin-top: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent, var(--primary)));
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px; box-shadow: 0 0 20px var(--glow);
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 30px var(--glow); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Success */
    .success-panel {
      display: none; text-align: center; padding: 40px 24px;
      background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.2);
      border-radius: 16px;
    }
    .success-panel.show { display: block; }
    .success-big { font-size: 64px; margin-bottom: 16px; animation: heroPulse 2s ease-in-out infinite; }
    .success-title { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #00ff88; margin-bottom: 8px; letter-spacing: 2px; }
    .success-text { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; }

    .footer { text-align: center; margin-top: 40px; font-size: 11px; color: rgba(255,255,255,0.15); }
    .footer a { color: rgba(255,255,255,0.25); text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.5); }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .hero-emoji { font-size: 56px; }
    }
  </style>
</head>
<body>
  <div id="bg">
    <div id="bg-gradient"></div>
    <div id="bg-grid"></div>
  </div>
  <div class="scanlines"></div>
  <div id="floaters"></div>

  <div class="page">
    <div class="powered">Rsvply ✦ Digital Invite</div>

    <div class="hero">
      <span class="hero-emoji" id="hero-emoji">🎉</span>
      <div class="headline" id="headline">Loading...</div>
      <div class="body-text" id="body-text"></div>
    </div>

    <div class="divider"></div>

    <div class="details-card" id="details-card"></div>

    <div class="rsvp-panel">
      <div class="rsvp-title">▶ Confirm Your Attendance</div>
      <form id="rsvp-form">
        <div class="field">
          <label>Your Name *</label>
          <input type="text" id="name" placeholder="Enter your full name" required />
        </div>
        <div class="status-btns">
          <button type="button" class="status-btn yes" onclick="setStatus('ACCEPTED')">✅ Yes, I'll be there!</button>
          <button type="button" class="status-btn no" onclick="setStatus('DECLINED')">❌ Can't make it</button>
        </div>
        <div id="accepted-fields" style="display:none">
          <div class="row">
            <div class="field"><label>Adults</label><input type="number" id="adults" min="1" max="20" value="1" /></div>
            <div class="field"><label>Kids</label><input type="number" id="kids" min="0" max="20" value="0" /></div>
          </div>
          <div class="field">
            <label>Food Preference</label>
            <select id="food">
              <option value="">No preference</option>
              <option value="Vegetarian">Vegetarian</option>
              <option value="Non-Vegetarian">Non-Vegetarian</option>
              <option value="Vegan">Vegan</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Notes (optional)</label>
          <input type="text" id="notes" placeholder="Any message for the host..." />
        </div>
        <button type="submit" class="submit-btn" id="submit-btn" disabled>SEND RSVP</button>
      </form>
      <div class="success-panel" id="success-panel">
        <div class="success-big" id="success-emoji">🎉</div>
        <div class="success-title" id="success-title">You're confirmed!</div>
        <div class="success-text" id="success-text">Thanks for your RSVP. See you there!</div>
      </div>
    </div>

    <div class="footer">Powered by <a href="/">Rsvply</a> · Create your own free invite</div>
  </div>

  <script>
    const eventId = window.location.pathname.split('/').pop();
    let selectedStatus = null;

    async function loadInvite() {
      const res = await fetch(`/api/event/${eventId}`);
      const event = await res.json();
      const theme = event.theme;

      // Apply CSS vars
      document.documentElement.style.setProperty('--primary', theme.palette.primary);
      document.documentElement.style.setProperty('--accent', theme.palette.accent || theme.palette.primary);
      document.documentElement.style.setProperty('--glow', theme.palette.glow || 'rgba(178,0,255,0.4)');
      document.documentElement.style.setProperty('--text', theme.palette.text || '#fff');
      document.documentElement.style.setProperty('--card', theme.palette.card || 'rgba(255,255,255,0.05)');

      // Background
      document.body.style.background = theme.palette.bg;
      document.getElementById('bg-gradient').style.background = theme.gradient || '';

      // Floating emojis
      const floaters = document.getElementById('floaters');
      (theme.floaters || theme.emoji).forEach((emoji, i) => {
        for (let j = 0; j < 3; j++) {
          const el = document.createElement('div');
          el.className = 'floater';
          el.textContent = emoji;
          el.style.left = `${Math.random() * 100}%`;
          el.style.animationDuration = `${8 + Math.random() * 12}s`;
          el.style.animationDelay = `${Math.random() * 10}s`;
          el.style.fontSize = `${16 + Math.random() * 20}px`;
          floaters.appendChild(el);
        }
      });

      document.title = `${event.eventName} — You're Invited!`;
      document.getElementById('hero-emoji').textContent = theme.emoji[0];
      document.getElementById('headline').textContent = theme.headline;
      document.getElementById('body-text').textContent = theme.body;

      // Details
      const date = new Date(event.date + 'T12:00:00');
      const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('details-card').innerHTML = `
        <div class="detail-row"><div class="detail-icon">📅</div><div><div class="detail-label">Date</div><div class="detail-val">${dateStr}</div></div></div>
        ${event.time ? `<div class="detail-row"><div class="detail-icon">⏰</div><div><div class="detail-label">Time</div><div class="detail-val">${event.time}</div></div></div>` : ''}
        <div class="detail-row"><div class="detail-icon">📍</div><div><div class="detail-label">Venue</div><div class="detail-val">${event.venue}</div></div></div>
        ${event.hostName ? `<div class="detail-row"><div class="detail-icon">👤</div><div><div class="detail-label">Hosted by</div><div class="detail-val">${event.hostName}</div></div></div>` : ''}
      `;
    }

    function setStatus(status) {
      selectedStatus = status;
      document.querySelector('.status-btn.yes').classList.toggle('active', status === 'ACCEPTED');
      document.querySelector('.status-btn.no').classList.toggle('active', status === 'DECLINED');
      document.getElementById('accepted-fields').style.display = status === 'ACCEPTED' ? 'block' : 'none';
      document.getElementById('submit-btn').disabled = false;
    }

    document.getElementById('rsvp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'SENDING...';
      try {
        await fetch(`/api/rsvp/${eventId}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            status: selectedStatus,
            adults: document.getElementById('adults').value,
            kids: document.getElementById('kids').value,
            food: document.getElementById('food').value,
            notes: document.getElementById('notes').value
          })
        });
        document.getElementById('rsvp-form').style.display = 'none';
        const panel = document.getElementById('success-panel');
        panel.classList.add('show');
        if (selectedStatus === 'ACCEPTED') {
          document.getElementById('success-emoji').textContent = '🎉';
          document.getElementById('success-title').textContent = "YOU'RE CONFIRMED!";
          document.getElementById('success-text').textContent = "Thanks for your RSVP. We can't wait to see you there!";
        } else {
          document.getElementById('success-emoji').textContent = '💙';
          document.getElementById('success-title').textContent = "THANKS FOR LETTING US KNOW";
          document.getElementById('success-text').textContent = "Sorry you can't make it. We'll miss you!";
        }
      } catch {
        btn.disabled = false; btn.textContent = 'SEND RSVP';
        alert('Something went wrong. Please try again.');
      }
    });

    loadInvite();
  </script>
</body>
</html>
