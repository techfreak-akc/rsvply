<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Invited!</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; font-family: 'Inter', sans-serif; }

    /* Theme variables injected by JS */
    :root {
      --bg: #07050f;
      --primary: #b200ff;
      --accent: #ff006e;
      --cyan: #00f5ff;
      --text: #ffffff;
    }

    body { background: var(--bg); color: var(--text); }

    .page { max-width: 560px; margin: 0 auto; padding: 40px 20px 80px; }

    .logo { font-size: 16px; font-weight: 800; color: var(--primary); opacity: 0.6; margin-bottom: 32px; }

    .invite-header { margin-bottom: 32px; }
    .emoji-banner { font-size: 48px; margin-bottom: 16px; }
    .headline {
      font-size: 32px; font-weight: 800; color: var(--primary);
      line-height: 1.2; margin-bottom: 12px;
    }
    .body-text { font-size: 15px; line-height: 1.8; opacity: 0.8; margin-bottom: 24px; }

    /* Event details */
    .details {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 20px; margin-bottom: 32px;
    }
    .detail-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .detail-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-val { font-size: 14px; font-weight: 600; color: #fff; margin-top: 2px; }

    /* RSVP Form */
    .rsvp-section { margin-top: 8px; }
    .rsvp-section h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--primary); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field select, .field textarea {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 12px 14px; color: #fff; font-family: 'Inter', sans-serif;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--primary); }
    .field select option { background: #1a0030; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .status-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .status-btn {
      padding: 14px; border-radius: 10px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
      background: rgba(255,255,255,0.05);
    }
    .status-btn.yes { color: #00ff88; }
    .status-btn.yes.active, .status-btn.yes:hover { background: rgba(0,255,136,0.1); border-color: #00ff88; }
    .status-btn.no { color: #ff4444; }
    .status-btn.no.active, .status-btn.no:hover { background: rgba(255,68,68,0.1); border-color: #ff4444; }

    .submit-btn {
      width: 100%; padding: 14px; margin-top: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .success-msg {
      display: none; text-align: center; padding: 32px 20px;
      background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.2);
      border-radius: 14px; margin-top: 16px;
    }
    .success-msg.show { display: block; }
    .success-msg .big { font-size: 48px; margin-bottom: 12px; }
    .success-msg h3 { font-size: 20px; font-weight: 700; color: #00ff88; margin-bottom: 8px; }
    .success-msg p { font-size: 14px; color: #64748b; }

    .powered { text-align: center; margin-top: 40px; font-size: 11px; color: #334155; }
    .powered a { color: #475569; text-decoration: none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">Rsvply</div>

    <div class="invite-header">
      <div class="emoji-banner" id="emoji-banner">🎉</div>
      <div class="headline" id="headline">You're Invited!</div>
      <div class="body-text" id="body-text">Loading...</div>
    </div>

    <div class="details" id="details"></div>

    <div class="rsvp-section">
      <h3>Will you be there?</h3>
      <form id="rsvp-form">
        <div class="field">
          <label>Your Name *</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>

        <div class="field">
          <label>Your Response *</label>
          <div class="status-btns">
            <button type="button" class="status-btn yes" id="btn-yes" onclick="setStatus('ACCEPTED')">✅ Yes, I'll be there!</button>
            <button type="button" class="status-btn no" id="btn-no" onclick="setStatus('DECLINED')">❌ Can't make it</button>
          </div>
        </div>

        <div id="accepted-fields" style="display:none">
          <div class="row">
            <div class="field">
              <label>Adults</label>
              <input type="number" id="adults" min="1" max="20" value="1" />
            </div>
            <div class="field">
              <label>Kids</label>
              <input type="number" id="kids" min="0" max="20" value="0" />
            </div>
          </div>
          <div class="field">
            <label>Food Preference</label>
            <select id="food">
              <option value="">No preference</option>
              <option value="Vegetarian">Vegetarian</option>
              <option value="Non-Vegetarian">Non-Vegetarian</option>
              <option value="Vegan">Vegan</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Notes (optional)</label>
          <input type="text" id="notes" placeholder="Any message for the host..." />
        </div>

        <button type="submit" class="submit-btn" id="submit-btn" disabled>Send RSVP</button>
      </form>

      <div class="success-msg" id="success-msg">
        <div class="big" id="success-emoji">🎉</div>
        <h3 id="success-title">You're confirmed!</h3>
        <p id="success-text">Thanks for your RSVP. See you there!</p>
      </div>
    </div>

    <div class="powered">Powered by <a href="/">Rsvply</a> · Create your own free invite</div>
  </div>

  <script>
    const eventId = window.location.pathname.split('/').pop();
    let selectedStatus = null;

    async function loadInvite() {
      const res = await fetch(`/api/event/${eventId}`);
      const event = await res.json();
      const theme = event.theme;

      // Apply theme
      document.documentElement.style.setProperty('--bg', theme.palette.bg);
      document.documentElement.style.setProperty('--primary', theme.palette.primary);
      document.documentElement.style.setProperty('--accent', theme.palette.accent || theme.palette.primary);
      document.documentElement.style.setProperty('--cyan', theme.palette.cyan || '#00f5ff');
      document.documentElement.style.setProperty('--text', theme.palette.text);
      document.title = `${event.eventName} — You're Invited!`;

      document.getElementById('emoji-banner').textContent = theme.emoji[0];
      document.getElementById('headline').textContent = theme.headline;
      document.getElementById('body-text').textContent = theme.body;

      // Details
      const date = new Date(event.date);
      const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('details').innerHTML = `
        <div class="detail-row"><div class="detail-icon">📅</div><div><div class="detail-label">Date</div><div class="detail-val">${dateStr}</div></div></div>
        ${event.time ? `<div class="detail-row"><div class="detail-icon">⏰</div><div><div class="detail-label">Time</div><div class="detail-val">${event.time}</div></div></div>` : ''}
        <div class="detail-row"><div class="detail-icon">📍</div><div><div class="detail-label">Venue</div><div class="detail-val">${event.venue}</div></div></div>
        ${event.hostName ? `<div class="detail-row"><div class="detail-icon">👤</div><div><div class="detail-label">Hosted by</div><div class="detail-val">${event.hostName}</div></div></div>` : ''}
      `;
    }

    function setStatus(status) {
      selectedStatus = status;
      document.getElementById('btn-yes').classList.toggle('active', status === 'ACCEPTED');
      document.getElementById('btn-no').classList.toggle('active', status === 'DECLINED');
      document.getElementById('accepted-fields').style.display = status === 'ACCEPTED' ? 'block' : 'none';
      document.getElementById('submit-btn').disabled = false;
    }

    document.getElementById('rsvp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Sending...';

      const body = {
        name: document.getElementById('name').value,
        status: selectedStatus,
        adults: document.getElementById('adults').value,
        kids: document.getElementById('kids').value,
        food: document.getElementById('food').value,
        notes: document.getElementById('notes').value
      };

      try {
        await fetch(`/api/rsvp/${eventId}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        document.getElementById('rsvp-form').style.display = 'none';
        const msg = document.getElementById('success-msg');
        msg.classList.add('show');
        if (selectedStatus === 'ACCEPTED') {
          document.getElementById('success-emoji').textContent = '🎉';
          document.getElementById('success-title').textContent = "You're confirmed!";
          document.getElementById('success-text').textContent = "Thanks for your RSVP. See you there!";
        } else {
          document.getElementById('success-emoji').textContent = '💙';
          document.getElementById('success-title').textContent = "Thanks for letting us know";
          document.getElementById('success-text').textContent = "Sorry you can't make it. We'll miss you!";
        }
      } catch {
        btn.disabled = false; btn.textContent = 'Send RSVP';
        alert('Something went wrong. Please try again.');
      }
    });

    loadInvite();
  </script>
</body>
</html>
