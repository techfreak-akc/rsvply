<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Invite is Live! — Rsvply</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07050f; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { max-width: 480px; width: 100%; text-align: center; }
    .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #b200ff, #ff006e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; }
    .big { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    p { color: #64748b; font-size: 14px; margin-bottom: 32px; line-height: 1.6; }

    .link-box {
      background: rgba(178,0,255,0.08); border: 1px solid rgba(178,0,255,0.2);
      border-radius: 12px; padding: 16px; margin-bottom: 24px; word-break: break-all;
    }
    .link-box .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .link-box .url { font-size: 14px; color: #b200ff; font-weight: 600; }

    .btns { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s; border: none;
    }
    .btn-primary { background: linear-gradient(135deg, #b200ff, #ff006e); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
    .btn-secondary:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Rsvply</div>
    <div class="big">🎉</div>
    <h1>Your invite is live!</h1>
    <p>Share the link below with your guests. They can RSVP directly from their phone or browser.</p>

    <div class="link-box">
      <div class="label">Your invite link</div>
      <div class="url" id="invite-url"></div>
    </div>

    <div class="btns">
      <button class="btn btn-primary" onclick="copyLink()">📋 Copy Invite Link</button>
      <button class="btn btn-secondary" onclick="goToDashboard()">📊 View Dashboard</button>
      <button class="btn btn-secondary" onclick="window.location.href='/'">✨ Create Another Invite</button>
    </div>
  </div>

  <script>
    const eventId = window.location.pathname.split('/').pop();
    const inviteUrl = `${window.location.origin}/invite/${eventId}`;
    document.getElementById('invite-url').textContent = inviteUrl;

    function copyLink() {
      navigator.clipboard.writeText(inviteUrl);
      const btn = document.querySelector('.btn-primary');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy Invite Link', 2000);
    }

    function goToDashboard() {
      window.location.href = `/dashboard/${eventId}`;
    }
  </script>
</body>
</html>
